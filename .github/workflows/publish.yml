name: Node.js Package

on:
  push:
    tags:
      - "*"
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # allows npm to authenticate via OIDC trusted publishing and generate provenance
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # trusted publishing requires npm >= 11.5.1, newer than the one bundled with Node 22
      - run: npm install -g npm@latest
      - run: npm install
      - run: npm publish --workspace=packages
